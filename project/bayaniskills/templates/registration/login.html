<!DOCTYPE html>
<html>
<head>
    <title>Login - Bayaniskills</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 16px;
            width: 300px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .logo {
            width: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="/static/images/logo.jpeg" class="logo">

    <h2>Welcome Back 👋</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
