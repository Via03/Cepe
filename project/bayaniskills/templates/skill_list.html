
{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Bayaniskills</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
        }

        /* NAVBAR */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        .logo img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
        }

        .btn-login {
            padding: 8px 15px;
            background: #38bdf8;
            border-radius: 8px;
            color: black;
            text-decoration: none;
            font-weight: bold;
        }

        /* HERO */
        .hero {
            text-align: center;
            padding: 40px 20px;
        }

        .hero h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .hero p {
            color: #94a3b8;
        }

        /* GRID */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        /* CARD */
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 16px;
            transition: 0.3s;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.08);
        }

        .price {
            color: #38bdf8;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px;
            background: #22c55e;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }

        .btn:hover {
            background: #16a34a;
        }

    </style>
</head>

<body>

<!-- NAV -->
 <div class="nav">
    <div class="logo">
        <img src="{% static 'images/logo.jpeg' %}">
        Bayaniskills
    </div>

    {% if user.is_authenticated %}
        <a href="{% url 'dashboard' %}" class="btn-login">Dashboard</a>
    {% else %}
        <a href="/login/" class="btn-login">Login</a>
    {% endif %}
</div>

<!-- HERO -->
<div class="hero">
    <h1>Hire a Bayani 💙</h1>
    <p>Community heroes ready to help you with their skills</p>
</div>

<!-- SKILLS -->
<div class="container">

    {% for skill in skills %}
    <div class="card">
        <h3>{{ skill.name }}</h3>
        <p>{{ skill.description }}</p>
        <p class="price">₱{{ skill.rate }}</p>

        <a href="{% url 'book_skill' skill.id %}" class="btn">
            Book Now
        </a>
    </div>
    {% endfor %}

</div>

</body>
</html>
